version: "3"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: school_management_app
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    user: "www-data"
    depends_on:
      - db
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
  db:
    image: mysql:8.0
    environment:
      MYSQL_USER: school_user
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: school_management
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      - mysql_backups:/backups
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      PMA_HOST: db
      PMA_PORT: 5432
      PMA_USER: school_user
      PMA_PASSWORD: secret
    ports:
      - "8081:80"
    depends_on:
      - db
    volumes:
      - phpmyadmin_data:/var/lib/phpmyadmin
      - mysql_backups:/backups
volumes:
  dbdata:
  phpmyadmin_data:
  mysql_backups:
